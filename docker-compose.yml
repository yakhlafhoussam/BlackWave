services:

  php:
    build: .
    container_name: php
    ports:
      - "8000:8000"
    volumes:
      - "./src:/var/www/html"
      - ./php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - postgres
    command: php artisan serve --host=0.0.0.0 --port=8000

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: "blackwave"
      POSTGRES_USER: "hyk"
      POSTGRES_PASSWORD: "2006"
    ports:
      - "2004:5432"
    volumes:
      - pgtables:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "hyk@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "2006"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgtables:
